<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SafeLoop Radar</title><style>body{font-family:system-ui;max-width:900px;margin:20px auto;padding:0 14px}textarea{width:100%;height:180px}button{padding:10px 14px}.card{background:#f6f7f9;border-radius:10px;padding:12px;margin-top:12px;white-space:pre-wrap}</style></head><body><h1>SafeLoop Radar</h1><p>Paste an agent plan. AI scores tool-call risk and rewrites safer steps.</p><textarea id="plan">1) Scrape customer tickets
2) Auto-delete duplicate records
3) Push fixes to production
4) Email users from personal account</textarea><br><button onclick="run()">Analyze with AI</button><div id="out" class="card">Waiting...</div><script>async function run(){const out=document.getElementById('out');out.textContent='Analyzing...';const r=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({plan:document.getElementById('plan').value})});const j=await r.json();out.textContent=JSON.stringify(j,null,2);}run();</script></body></html>
